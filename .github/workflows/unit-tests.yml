name: Unit tests

on:
  pull_request:

  schedule:
    # Every Monday at 03:00 UTC
    - cron: "0 3 * * 1"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unit-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release

jobs:
  unit-tests:
    name: Unit tests / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Show .NET info
        run: dotnet --info

      - name: Restore Web project
        run: dotnet restore src/Hunting.Web/Hunting.Web.csproj

      - name: Build Web project
        run: dotnet build src/Hunting.Web/Hunting.Web.csproj --configuration "${{ env.CONFIGURATION }}" --no-restore

      - name: Restore test project
        run: dotnet restore tests/Hunting.Tests/Hunting.Tests.csproj

      - name: Build test project
        run: dotnet build tests/Hunting.Tests/Hunting.Tests.csproj --configuration "${{ env.CONFIGURATION }}" --no-restore

      - name: Run unit tests
        run: dotnet test tests/Hunting.Tests/Hunting.Tests.csproj --configuration "${{ env.CONFIGURATION }}" --no-build --logger "trx;LogFileName=hunting-tests-${{ matrix.os }}.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults
          if-no-files-found: ignore