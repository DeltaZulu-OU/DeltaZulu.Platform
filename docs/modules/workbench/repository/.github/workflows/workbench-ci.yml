name: Workbench CI

on:
  pull_request:
    paths:
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'DeltaZulu.Platform.slnx'
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/workbench-ci.yml'
  push:
    branches: [ main, master ]
    paths:
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'DeltaZulu.Platform.slnx'
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/workbench-ci.yml'

permissions:
  contents: read

jobs:
  build-test:
    name: ${{ matrix.os }} build and test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore packages
        run: dotnet restore DeltaZulu.Platform.slnx --locked-mode

      - name: Build
        run: dotnet build DeltaZulu.Platform.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test DeltaZulu.Platform.slnx --configuration Release --no-build --logger trx
